
api.security.token.secret=123456
# ==============================================================
# CONFIGURAÇĂO DE BANCO DE DADOS (DOCKER LOCAL)
# ==============================================================
spring.datasource.url=jdbc:postgresql://localhost:5434/logitruck_db
spring.datasource.username=wesley
spring.datasource.password=senha_forte
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# HIBERNATE & JPA
# ==============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace
spring.jpa.properties.hibernate.generate_statistics=true

# ==============================================================
# FLYWAY (MIGRATIONS)
# ==============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true